server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Supabase Edge Function for SPLP Integration
    location /functions/v1/public-api/ {
        proxy_pass https://mktisnafsfskvqylvaxs.supabase.co/functions/v1/public-api/;
        proxy_set_header Host mktisnafsfskvqylvaxs.supabase.co;
        proxy_ssl_server_name on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
